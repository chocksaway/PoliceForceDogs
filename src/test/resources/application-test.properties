# Test environment overrides - use in-memory H2 for isolated tests
# Use a short-lived in-memory DB and create-drop schema so each test context starts
# with a clean database and avoids primary key collisions when multiple contexts
# are created in the same JVM during the test run.
datasources.default.url=jdbc:h2:mem:police-force-dogs;DB_CLOSE_DELAY=0;DB_CLOSE_ON_EXIT=FALSE
datasources.default.username=sa
datasources.default.password=
datasources.default.driver-class-name=org.h2.Driver

# Create and drop schema for each test application context
jpa.default.properties.hibernate.hbm2ddl.auto=create-drop
jpa.default.properties.hibernate.show_sql=true

# Optional: make Hibernate SQL visible in logs
logger.org.hibernate.SQL=DEBUG
logger.org.hibernate.type.descriptor.sql=TRACE

