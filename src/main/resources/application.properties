#Sat Jun 20 10:38:24 UTC 2026
micronaut.application.name=policeforcedogs
# Use standard environment placeholder defaults. If you want to override, set JDBC_URL, JDBC_USER or JDBC_PASSWORD.
datasources.default.url=${JDBC_URL:jdbc:h2:file:./target/police-force-dogs;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
datasources.default.username=${JDBC_USER:sa}
datasources.default.password=${JDBC_PASSWORD:}
datasources.default.driver-class-name=${JDBC_DRIVER:org.h2.Driver}

jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=true

# Expose generated OpenAPI files and serve Swagger UI
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger

# Serve swagger-ui webjar at /swagger-ui
micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/resources/webjars/swagger-ui/4.15.5
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui

